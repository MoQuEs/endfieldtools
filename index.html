<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Endfield Tools</title>

	<link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
	<link rel="icon" type="image/png" href="images/favicon.ico">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
	<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
	<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

	<link rel="stylesheet" href="./style.css" />
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const tools = {
        "Sites": [
            {
                name: 'Essence Tracker',
                description: 'Track essence priorities, find optimal engraving matches, and use the built-in checker to sort weapons faster.',
                available: true,
                href: 'https://moques.github.io/essencetracker/',
                repository: 'https://github.com/MoQuEs/essencetracker',
                image: 'https://moques.github.io/essencetracker/images/preview_main.png',
                tags: ['Site', 'Tool', 'Tracker', 'Planner', 'Essence', 'Upgrade']
            },
            {
                name: 'Randomizer',
                description: 'Make random squads and more',
                available: true,
                href: 'https://moques.github.io/randomizer/',
                repository: 'https://github.com/MoQuEs/randomizer',
                image: 'https://moques.github.io/randomizer/images/preview_main.png',
                tags: ['Site', 'Tool', 'Gameplay', 'Randomizer']
            },
            {
                name: 'DataField',
                description: 'Tools, tests and data will continue to be added/modified every day.',
                available: true,
                href: 'https://datafield.cc/',
                image: 'images/preview/datafield.cc.png',
                tags: ['Site', 'Database', 'Tool', 'Information', 'Teams', 'Builds', 'Gears']
            },
            {
                name: 'ENDFIELDTOOLS',
                description: '// COMMUNITY.HUB',
                available: true,
                href: 'https://endfieldtools.dev/',
                image: 'images/preview/endfieldtools.dev.png',
                tags: ['Site', 'Tool', 'Information', 'Teams', 'Builds', 'Gears', 'Factory', 'Gameplay', 'Map']
            },
            {
                name: 'Talos Pioneers',
                description: 'Discover and share Endfield Blueprints on Talos Pioneers, the Arknights: Endfield community platform for Endministrators to collaborate and exchange strategies.',
                available: true,
                href: 'https://talospioneers.com/',
                image: 'images/preview/talospioneers.com.png',
                tags: ['Site', 'Tool', 'Factory', 'Gameplay', 'Blueprints']
            },
            {
                name: 'RotationForge',
                description: 'Forge your rotations. RotationForge is built around combat rotations: choose a team, place skills on a timeline, inspect triggers and cooldowns, then share the exact sequence with other players.',
                available: true,
                href: 'https://rotationforge.gg/',
                image: 'images/preview/rotationforge.gg.png',
                tags: ['Site', 'Tool', 'Gameplay', 'Rotation']
            }
        ],
        "Wiki": [
            {
                name: 'Endfield Talos Wiki',
                description: 'The Endfield Talos Wiki is an unofficial, community-driven encyclopedia of the real-time 3D RPG game, Arknights: Endfield, currently hosting 4,374 articles.\n' +
                    'All contributors are encouraged to review the Policies and Guidelines before making edits or additions to the wiki. ',
                available: true,
                href: 'https://endfield.wiki.gg/',
                image: 'images/preview/endfield.wiki.gg.png',
                tags: ['Site', 'Wiki', 'Information', 'Database']
            }
        ]
    };

    function ToolCard({tool}) {
        return (
            <article className="tool-card">
                <a
                    className="tool-preview tool-preview-link"
                    href={tool.href || tool.repository || '#'}
                    target="_blank"
                    rel="noopener noreferrer"
                >
                    <img src={tool.image} alt={`${tool.name} preview`} />
                    <div className="tool-preview-overlay">
                        <div className="tool-preview-topline">
                            {tool.available === false ? (<div className="tool-status">In works</div>) : null}
                            <div className="section-kicker tool-preview-title">{tool.name}</div>
                        </div>
                        <p className="tool-preview-description">{tool.description}</p>
                    </div>
                </a>

                <div className="tool-content">
                    <div className="tool-actions">
                        {tool.available ? (
                            <a className="reset-btn tool-launch" href={tool.href} target="_blank"
                               rel="noopener noreferrer">Open</a>
                        ) : null}
                        {tool.repository ? (
                            <a className="reset-btn tool-launch" href={tool.repository} target="_blank"
                               rel="noopener noreferrer">Repository</a>
                        ) : null}
                    </div>
                    <div className="tool-tags">
                        {tool.tags.map(tag => <span key={tag} className="stat-badge">{tag}</span>)}
                    </div>

                </div>
            </article>
        );
    }

    function App() {
        const [searchQuery, setSearchQuery] = React.useState('');
        const [selectedTag, setSelectedTag] = React.useState(null);

        const allTags = [...new Set(Object.values(tools).flat().flatMap(tool => tool.tags))];

        const handleTagClick = (tag) => {
            setSelectedTag(selectedTag !== tag ? tag : null);
        };

        const filteredTools = Object.entries(tools).reduce((acc, [groupName, toolsInGroup]) => {
            const filtered = toolsInGroup.filter(tool => {
                const searchMatch = tool.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    tool.description.toLowerCase().includes(searchQuery.toLowerCase());
                const tagMatch = selectedTag === null || tool.tags.includes(selectedTag);
                return searchMatch && tagMatch;
            });

            if (filtered.length > 0) {
                acc[groupName] = filtered;
            }
            return acc;
        }, {});

        return (
            <main className="landing-shell container-fluid py-4 py-lg-5">
                <section className="hero-panel">
                    <div className="hero-copy">
                        <div className="eyebrow">Endfield fan tools</div>
                        <div className="search-container mt-4">
                            <input
                                type="text"
                                placeholder="Search tools..."
                                className="form-control"
                                aria-label="Search tools"
                                value={searchQuery}
                                onChange={e => setSearchQuery(e.target.value)}
                            />
                            <div className="section-kicker mt-2">Tags:</div>
                            <div className="tags-container mt-2">
                                {allTags.map(tag => (
                                    <button
                                        key={tag}
                                        className={`checker-chip ${selectedTag === tag ? 'checker-chip-active' : ''}`}
                                        onClick={() => handleTagClick(tag)}
                                    >
                                        {tag}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                </section>

                <section className="tools-section mt-4 mt-lg-5">
                    {Object.entries(filteredTools).map(([groupName, toolsInGroup]) => (
                        <div key={groupName} className="tool-group mt-4">
                            <div className="section-heading">
                                <h3 className="section-title mb-0">{groupName.split('::')[0]}</h3>
                                <div className="section-kicker">{groupName.split('::')[1] ? groupName.split('::')[1] : ''}</div>
                            </div>
                            <div className="tool-grid mt-3">
                                {toolsInGroup.map(tool => (
                                    <ToolCard key={tool.name} tool={tool} />
                                ))}
                            </div>
                        </div>
                    ))}
                </section>
            </main>
        );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
