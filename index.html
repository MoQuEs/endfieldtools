<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endfield Tools</title>

    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
    <link rel="icon" type="image/png" href="images/favicon.ico">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link rel="stylesheet" href="./style.css"/>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const tools = {
            "Site::Own": [
                {
                    name: 'Essence Tracker',
                    description: 'Track essence priorities, find optimal engraving matches, and use the built-in checker to sort weapons faster.',
                    available: true,
                    href: 'https://moques.github.io/essencetracker/',
                    repository: 'https://github.com/MoQuEs/essencetracker',
                    image: 'https://moques.github.io/essencetracker/images/preview_main.png',
                    tags: ['Site', 'Tool', 'Tracker', 'Planner', 'Checker', 'Essence', 'Upgrade']
                },
                {
                    name: 'Randomizer',
                    description: 'Make random squads and more',
                    available: true,
                    href: 'https://moques.github.io/randomizer/',
                    repository: 'https://github.com/MoQuEs/randomizer',
                    image: 'https://moques.github.io/randomizer/images/preview_main.png',
                    tags: ['Site', 'Tool', 'Gameplay', 'Randomizer']
                }
            ]
        };

        function ToolCard({ tool }) {
            return (
                <article
                    className={`tool-card`}
                >
                    <div className="tool-preview">
                        <img src={tool.image} alt={`${tool.name} preview`} />
                    </div>

                    <div className="tool-content">
                        <div className="d-flex justify-content-between align-items-start gap-3 flex-wrap">
                            <div>
                                {tool.available === false ? (<div className="tool-status">In works</div>) : null}
                                <h2 className="tool-title mb-2">{tool.name}</h2>
                            </div>
                        </div>

                        <p className="tool-description">{tool.description}</p>

                        <div className="tool-tags">
                            {tool.tags.map(tag => <span key={tag} className="stat-badge">{tag}</span>)}
                        </div>

                        <div className="tool-actions">
                            {tool.available ? (
                                    <a className="reset-btn tool-launch" href={tool.href} target="_blank" rel="noopener noreferrer">Open</a>
                            ) : null}
                            {tool.repository ? (
                                    <a className="reset-btn tool-launch" href={tool.repository} target="_blank" rel="noopener noreferrer">Repository</a>
                            ) : null}
                        </div>
                    </div>
                </article>
            );
        }

        function App() {
            const [searchQuery, setSearchQuery] = React.useState('');
            const [selectedTags, setSelectedTags] = React.useState([]);

            const allTags = [...new Set(Object.values(tools).flat().flatMap(tool => tool.tags))];

            const handleTagClick = (tag) => {
                setSelectedTags(prev =>
                    prev.includes(tag) ? prev.filter(t => t !== tag) : [...prev, tag]
                );
            };

            const filteredTools = Object.entries(tools).reduce((acc, [groupName, toolsInGroup]) => {
                const filtered = toolsInGroup.filter(tool => {
                    const searchMatch = tool.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                                      tool.description.toLowerCase().includes(searchQuery.toLowerCase());
                    const tagMatch = selectedTags.length === 0 || selectedTags.every(tag => tool.tags.includes(tag));
                    return searchMatch && tagMatch;
                });

                if (filtered.length > 0) {
                    acc[groupName] = filtered;
                }
                return acc;
            }, {});

            return (
                <main className="landing-shell container-fluid py-4 py-lg-5">
                    <section className="hero-panel">
                        <div className="hero-copy">
                            <div className="eyebrow">Endfield fan tools</div>
                            <div className="search-container mt-4">
                                <input
                                        type="text"
                                        placeholder="Search tools..."
                                        className="form-control"
                                        value={searchQuery}
                                        onChange={e => setSearchQuery(e.target.value)}
                                />
                                <div className="tags-container mt-2">
                                    {allTags.map(tag => (
                                        <button
                                                key={tag}
                                                className={`btn btn-sm me-2 mb-2 ${selectedTags.includes(tag) ? 'btn-primary' : 'btn-outline-secondary'}`}
                                                onClick={() => handleTagClick(tag)}
                                        >
                                            {tag}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </section>

                    <section className="tools-section mt-4 mt-lg-5">
                        {Object.entries(filteredTools).map(([groupName, toolsInGroup]) => (
                            <div key={groupName} className="tool-group mt-4">
                                <div className="section-heading">
                                    <h3 className="section-title mb-0">{groupName.split('::')[0]}</h3>
                                    <div className="section-kicker">{groupName.split('::')[0]}</div>
                                </div>
                                <div className="tool-grid mt-3">
                                    {toolsInGroup.map(tool => (
                                        <ToolCard
                                            key={tool.name}
                                            tool={tool}
                                        />
                                    ))}
                                </div>
                            </div>
                        ))}
                    </section>
                </main>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
